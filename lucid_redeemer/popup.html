<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lucid Code Redeemer</title>
  <style>
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 12px;
      background: #1e1e1e;
      color: #e0e0e0;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 10px 0;
      font-weight: 600;
    }
    label {
      display: block;
      font-size: 11px;
      color: #aaa;
      margin: 8px 0 4px;
    }
    textarea {
      width: 100%;
      box-sizing: border-box;
      height: 140px;
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 6px;
      font-family: monospace;
      font-size: 12px;
      resize: vertical;
    }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }
    input[type="number"] {
      width: 80px;
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 12px;
    }
    button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    #start { background: #089981; color: white; }
    #stop  { background: #c0392b; color: white; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      margin-top: 10px;
      font-size: 11px;
      padding: 6px;
      background: #2a2a2a;
      border-radius: 4px;
      min-height: 30px;
      max-height: 100px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: monospace;
    }
    .progress {
      font-size: 11px;
      color: #aaa;
      margin-top: 6px;
    }
    .bridge-status {
      font-size: 10px;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 5px;
      color: #aaa;
    }
    .bridge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #555;
    }
    .bridge-dot.connected { background: #089981; }
    .bridge-dot.disconnected { background: #c0392b; }
  </style>
</head>
<body>
  <h1>Lucid Code Redeemer</h1>

  <label for="codes">Codes (one per line)</label>
  <textarea id="codes" placeholder="ABC-123-XYZ&#10;DEF-456-UVW"></textarea>

  <div class="row">
    <label style="margin:0">Delay (ms)</label>
    <input type="number" id="delay" value="5000" min="500" step="500">
    <label style="margin:0;display:flex;align-items:center;gap:4px;cursor:pointer">
      <input type="checkbox" id="randomize"> Shuffle list
    </label>
  </div>

  <div class="row">
    <button id="start">Start</button>
    <button id="stop">Stop</button>
  </div>

  <div class="progress" id="progress">Idle</div>
  <div class="status" id="status"></div>
  <div class="bridge-status">
    <div class="bridge-dot" id="bridgeDot"></div>
    <span id="bridgeLabel">Discord Bridge: —</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
